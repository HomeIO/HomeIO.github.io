{{ define "main" }}
<article class="post">
  <header class="post-header">
    <h1>{{ .Title }}</h1>
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006 January 02" }}</time>
      {{ with .Params.topics }}
        <span class="post-topics">
          {{ range . }}
            <a href="{{ "topics/" | absURL }}{{ . | urlize }}/" class="topic-badge">{{ . }}</a>
          {{ end }}
        </span>
      {{ end }}
    </div>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>

  {{ with .Params.tags }}
  <div class="post-tags">
    {{ range . }}
      <a href="{{ "tags/" | absURL }}{{ . | urlize }}/">#{{ . }}</a>
    {{ end }}
  </div>
  {{ end }}
</article>
{{ end }}

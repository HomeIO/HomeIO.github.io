# homeio.org — personal tech blog
baseURL = 'https://homeio.org/'
locale = 'en-us'
title = 'homeio.org'
theme = 'homeio'

# Content & rendering
paginate = 10
summaryLength = 40
enableRobotsTXT = true

# Taxonomies — topics are the primary way to organize content
[taxonomies]
  topic = 'topics'
  tag = 'tags'

# Syntax highlighting for code blocks
[markup]
  [markup.highlight]
    style = 'dracula'
    lineNos = false
    guessSyntax = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true  # allow raw HTML in markdown (for embeds, charts)
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]

# Main navigation
[menus]
  [[menus.main]]
    name = 'Blog'
    url = '/posts/'
    weight = 10
  [[menus.main]]
    name = 'Projects'
    url = '/projects/'
    weight = 15
  [[menus.main]]
    name = 'Topics'
    url = '/topics/'
    weight = 20
  [[menus.main]]
    name = 'About'
    url = '/about/'
    weight = 30

# RSS — enable per-section and per-topic feeds
[outputFormats]
  [outputFormats.RSS]
    mediatype = 'application/rss+xml'
    baseName = 'feed'

[outputs]
  home = ['HTML', 'RSS']
  section = ['HTML', 'RSS']
  taxonomy = ['HTML', 'RSS']
  term = ['HTML', 'RSS']

# Parameters
[params]
  description = 'Personal tech blog — energy, smart home, urban transport, and more'
  author = 'Olek'
